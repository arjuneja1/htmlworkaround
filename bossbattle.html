<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol: UNIT-776</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --damage-red: #ff4141;
            --player-blue: #4141ff;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-box {
            border: 2px solid var(--neon-green);
            padding: 30px;
            width: 90%;
            max-width: 500px;
            background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
        }

        .hp-container {
            margin: 20px 0;
            text-align: left;
        }

        .hp-bar-outer {
            width: 100%;
            height: 15px;
            background: #222;
            border: 1px solid var(--neon-green);
            margin-top: 5px;
        }

        .hp-fill {
            height: 100%;
            width: 100%;
            transition: width 0.4s ease-out;
        }

        #boss-fill { background-color: var(--damage-red); }
        #player-fill { background-color: var(--player-blue); }

        button {
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            padding: 15px 30px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
        }

        #log {
            height: 60px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .hidden { display: none !important; }
        
        a { color: gold; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="ui-battle">
            <h2 id="boss-name">ANTAGONIST_V2.exe</h2>
            <div class="hp-container">
                <label>ROBOT CORE INTEGRITY</label>
                <div class="hp-bar-outer"><div id="boss-fill" class="hp-fill"></div></div>
            </div>

            <div class="hp-container">
                <label>USER VITAL SIGNS</label>
                <div class="hp-bar-outer"><div id="player-fill" class="hp-fill"></div></div>
            </div>

            <button id="btn-attack">Execute Attack</button>
            <p id="log">System initialized. Awaiting user input...</p>
        </div>

        <div id="ui-locked" class="hidden">
            <h1 style="color: var(--damage-red);">ACCESS DENIED</h1>
            <p>Your hardware signature has been blacklisted due to combat failure.</p>
            <p>Connection Terminated.</p>
        </div>
